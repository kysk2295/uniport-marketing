<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #0F172A;
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .slide {
    width: 920px;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    background: #10B981;
    color: white;
    font-size: 22px;
    font-weight: 800;
    padding: 8px 18px;
    border-radius: 30px;
    letter-spacing: -0.5px;
  }
  .slide-num {
    color: rgba(255,255,255,0.4);
    font-size: 20px;
    font-weight: 500;
    margin-left: auto;
  }
  .main-text {
    color: #FFFFFF;
    font-size: 64px;
    font-weight: 800;
    line-height: 1.25;
    letter-spacing: -2px;
    word-break: keep-all;
  }
  .main-text em {
    color: #10B981;
    font-style: normal;
  }
  .example {
    background: #1E293B;
    color: rgba(255,255,255,0.75);
    font-size: 30px;
    font-weight: 500;
    padding: 28px 36px;
    border-radius: 20px;
    line-height: 1.6;
    border-left: 4px solid #10B981;
    word-break: keep-all;
  }
  .cta-box {
    background: #10B981;
    color: white;
    font-size: 36px;
    font-weight: 800;
    padding: 32px 40px;
    border-radius: 20px;
    text-align: center;
    letter-spacing: -0.5px;
  }
  .footer {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }
  .hashtag {
    color: rgba(255,255,255,0.35);
    font-size: 22px;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <div class="logo">UniPort</div>
    <div class="slide-num">1 / 7</div>
  </div>
  <div class="main-text">"타코... 먹는 거 아님?"</div>
  
  
  <div class="footer">
    <span class="hashtag">#유니포트 #주식입문 #Z세대재테크</span>
  </div>
</div>
</body>
</html>
