<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0F172A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #0F172A; font-family: Arial, sans-serif;
  display: flex; align-items: center; justify-content: center;
}
.container {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; width: 100%; height: 100%;
}
.badge {
  background: #4F46E5; border-radius: 20pt;
  margin-bottom: 20pt;
}
.badge p {
  color: #FFFFFF; font-size: 11pt; font-weight: bold;
  letter-spacing: 2pt; margin: 6pt 18pt;
}
.title-block {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 24pt;
}
h1 {
  color: #FFFFFF; font-size: 40pt; font-weight: bold;
  text-align: center; margin: 0 0 8pt 0;
}
.subtitle p {
  color: #818CF8; font-size: 16pt; text-align: center; margin: 0;
}
.divider {
  width: 60pt; height: 3pt; background: #4F46E5;
  border-radius: 2pt; margin-bottom: 24pt;
}
.meta {
  display: flex; gap: 32pt;
}
.meta-item {
  display: flex; flex-direction: column; align-items: center;
}
.meta-item .label p {
  color: #64748B; font-size: 9pt; text-align: center; margin: 0 0 4pt 0;
}
.meta-item .value p {
  color: #CBD5E1; font-size: 12pt; font-weight: bold; text-align: center; margin: 0;
}
</style>
</head>
<body>
<div class="container">
  <div class="badge"><p>UNIPORT × 대학교 부스 이벤트</p></div>
  <div class="title-block">
    <h1>캠퍼스 투자 체험 부스</h1>
    <div class="subtitle"><p>기획안 보고서</p></div>
  </div>
  <div class="divider"></div>
  <div class="meta">
    <div class="meta-item">
      <div class="label"><p>목적</p></div>
      <div class="value"><p>잠재 유저 확보</p></div>
    </div>
    <div class="meta-item">
      <div class="label"><p>소요 시간</p></div>
      <div class="value"><p>1~2분 / 인당</p></div>
    </div>
    <div class="meta-item">
      <div class="label"><p>타겟</p></div>
      <div class="value"><p>Z세대 대학생</p></div>
    </div>
  </div>
</div>
</body>
</html>
